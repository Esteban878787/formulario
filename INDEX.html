<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Peticiones</title>

<!-- Librería para generar Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f0f2f5;
    margin:30px;
}

h2{
    text-align:center;
    color:#003366;
}

.contenedor{

    width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 0px 15px gray;

}

label{

    font-weight:bold;

}

input, textarea{

    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #bbb;
    font-size:15px;
    box-sizing:border-box;

}

textarea{

    height:100px;
    resize:none;

}

.botones{

    display:flex;
    gap:15px;

}

button{

    flex:1;
    padding:12px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    color:white;

}

.guardar{

    background:#198754;

}

.excel{

    background:#0d6efd;

}

.limpiar{

    background:#dc3545;

}

table{

    width:100%;
    border-collapse:collapse;
    margin-top:25px;

}

th{

    background:#003366;
    color:white;
    padding:12px;

}

td{

    padding:10px;
    border:1px solid #ddd;

}

tr:nth-child(even){

    background:#f5f5f5;

}

.eliminar{

    background:#dc3545;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
    border-radius:4px;

}

</style>

</head>

<body>

<div class="contenedor">

<h2>REGISTRO DE PETICIONES</h2>

<label>Nombre</label>
<input type="text" id="nombre">

<label>Petición</label>
<textarea id="peticion"></textarea>

<label>Fecha</label>
<input type="date" id="fecha" readonly>

<div class="botones">

<button class="guardar" onclick="agregar()">Agregar Registro</button>

<button class="excel" onclick="exportarExcel()">Descargar Excel</button>

<button class="limpiar" onclick="limpiar()">Limpiar</button>

</div>

<table id="tabla">

<thead>

<tr>

<th>No.</th>

<th>Nombre</th>

<th>Petición</th>

<th>Fecha</th>

<th>Acción</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script>

// Fecha actual
let hoy = new Date();

let fecha =
hoy.getFullYear()+"-"+
String(hoy.getMonth()+1).padStart(2,"0")+"-"+
String(hoy.getDate()).padStart(2,"0");

document.getElementById("fecha").value=fecha;

let consecutivo=1;

// Agregar registro
function agregar(){

let nombre=document.getElementById("nombre").value.trim();
let peticion=document.getElementById("peticion").value.trim();
let fecha=document.getElementById("fecha").value;

if(nombre=="" || peticion==""){

alert("Capture todos los datos");

return;

}

let tabla=document.getElementById("tabla").getElementsByTagName("tbody")[0];

let fila=tabla.insertRow();

fila.insertCell(0).innerHTML=consecutivo++;
fila.insertCell(1).innerHTML=nombre;
fila.insertCell(2).innerHTML=peticion;
fila.insertCell(3).innerHTML=fecha;

let accion=fila.insertCell(4);

accion.innerHTML="<button class='eliminar' onclick='eliminarFila(this)'>Eliminar</button>";

document.getElementById("nombre").value="";
document.getElementById("peticion").value="";
document.getElementById("nombre").focus();

}

// Eliminar fila

function eliminarFila(btn){

let fila=btn.parentNode.parentNode;

fila.parentNode.removeChild(fila);

}

// Limpiar formulario

function limpiar(){

document.getElementById("nombre").value="";
document.getElementById("peticion").value="";
document.getElementById("nombre").focus();

}

// Exportar Excel

function exportarExcel(){

let tabla=document.getElementById("tabla");

let wb=XLSX.utils.table_to_book(tabla,{sheet:"Peticiones"});

XLSX.writeFile(wb,"Registro_Peticiones.xlsx");

}

</script>

</body>

</html>
